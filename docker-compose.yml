services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lunar-chaperone:latest
    container_name: lunar-chaperone
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
